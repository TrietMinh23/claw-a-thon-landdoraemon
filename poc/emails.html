<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duyệt Email — L&D Ops Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="_shared.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
body { font-family:'Inter',sans-serif; background:#f8fafc; }
.email-item { cursor:pointer; transition:background 0.1s; }
.email-item:hover { background:#f9fafb; }
.email-item.active { background:#f0fdf4; border-left:3px solid #16a34a; }
.sidebar-link:hover { background:#f3f4f6; }
</style>
</head>
<body class="text-gray-800">
<div class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <aside class="w-56 bg-white border-r border-gray-100 flex flex-col shadow-sm flex-shrink-0">
    <div class="p-4 border-b border-gray-100">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-green-600 flex items-center justify-center text-white font-bold text-sm">L</div>
        <div><div class="font-bold text-sm">L&D Ops</div><div class="text-xs text-gray-400">Zalopay · Toro AI</div></div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-0.5 text-sm">
      <a href="index.html" class="sidebar-link flex items-center gap-2.5 px-3 py-2 rounded-lg text-gray-600 text-sm">← Dashboard</a>
      <div class="text-xs text-gray-400 font-medium uppercase tracking-wide px-3 py-2 mt-1">Loại email</div>
      <button onclick="filterEmails('all')" class="filter-btn w-full text-left flex items-center gap-2 px-3 py-2 rounded-lg text-xs text-gray-600 hover:bg-gray-50">
        <span class="w-2 h-2 rounded-full bg-gray-400"></span> Tất cả
        <span id="count-all" class="ml-auto font-bold"></span>
      </button>
      <button onclick="filterEmails('invite')" class="filter-btn w-full text-left flex items-center gap-2 px-3 py-2 rounded-lg text-xs text-gray-600 hover:bg-gray-50">
        <span class="w-2 h-2 rounded-full bg-orange-400"></span> Email mời tham dự
        <span id="count-invite" class="ml-auto font-bold"></span>
      </button>
      <button onclick="filterEmails('setup')" class="filter-btn w-full text-left flex items-center gap-2 px-3 py-2 rounded-lg text-xs text-gray-600 hover:bg-gray-50">
        <span class="w-2 h-2 rounded-full bg-blue-400"></span> Setup phòng AF/IT
        <span id="count-setup" class="ml-auto font-bold"></span>
      </button>
      <button onclick="filterEmails('remind')" class="filter-btn w-full text-left flex items-center gap-2 px-3 py-2 rounded-lg text-xs text-gray-600 hover:bg-gray-50">
        <span class="w-2 h-2 rounded-full bg-purple-400"></span> Remind
        <span id="count-remind" class="ml-auto font-bold"></span>
      </button>
    </nav>
    <div class="p-3 border-t border-gray-100">
      <div class="flex items-center gap-2.5 px-2 py-1.5">
        <div class="w-7 h-7 rounded-full bg-green-100 flex items-center justify-center text-green-700 text-xs font-bold">A</div>
        <div class="text-xs"><div class="font-medium">AnhNH19</div><div class="text-gray-400">L&D PIC</div></div>
      </div>
    </div>
  </aside>

  <main class="flex-1 overflow-hidden flex flex-col">
    <header class="bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between flex-shrink-0">
      <div>
        <h1 class="text-lg font-semibold">Duyệt Email</h1>
        <p class="text-xs text-gray-400">Strengths-based Development Program · <span id="header-count"></span> email chờ duyệt</p>
      </div>
      <div class="flex gap-2">
        <button onclick="approveAll()" id="btn-approve-all" class="bg-green-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-green-700 font-medium transition flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Duyệt tất cả & Gửi
        </button>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- EMAIL LIST PANEL -->
      <div class="w-72 border-r border-gray-100 overflow-y-auto bg-white flex-shrink-0" id="email-list-panel"></div>

      <!-- EMAIL PREVIEW PANEL -->
      <div class="flex-1 overflow-y-auto p-5 space-y-4" id="email-preview-panel">
        <div class="flex items-center justify-center h-full text-gray-400 text-sm">
          ← Chọn một email để xem preview
        </div>
      </div>
    </div>
  </main>
</div>

<script>
let currentFilter = 'all';
let currentEmailId = null;

function getPendingEmails() {
  const approved = getApprovedEmails();
  return MOCK.emails.filter(e => !approved.includes(e.id));
}

function renderEmailList(filter) {
  const panel = document.getElementById('email-list-panel');
  const pending = getPendingEmails();
  const filtered = filter === 'all' ? pending : pending.filter(e => e.type === filter);
  const all = MOCK.emails;

  // Update counts
  document.getElementById('count-all').textContent = pending.length || '';
  document.getElementById('count-invite').textContent = pending.filter(e=>e.type==='invite').length || '';
  document.getElementById('count-setup').textContent = pending.filter(e=>e.type==='setup').length || '';
  document.getElementById('count-remind').textContent = pending.filter(e=>e.type==='remind').length || '';
  document.getElementById('header-count').textContent = pending.length;

  // Approved emails section
  const approved = getApprovedEmails();
  const approvedEmails = all.filter(e => approved.includes(e.id));

  let html = '';
  if (filtered.length === 0 && filter === 'all') {
    html = `<div class="p-6 text-center text-xs text-gray-400">
      <div class="text-2xl mb-2">✅</div>
      Tất cả email đã được duyệt và gửi!
    </div>`;
  } else {
    filtered.forEach(e => {
      html += `<div class="email-item border-b border-gray-100 p-4 ${currentEmailId===e.id?'active':''}" onclick="selectEmail('${e.id}')">
        <div class="flex items-start justify-between mb-1">
          <span class="text-xs font-semibold text-gray-800 pr-2">${e.label}</span>
          <span class="text-xs bg-orange-100 text-orange-700 px-1.5 py-0.5 rounded font-medium whitespace-nowrap">Chờ duyệt</span>
        </div>
        <div class="text-xs text-gray-500">${e.count > 1 ? e.count+' học viên' : '1 email'} · ${e.date}</div>
        <div class="text-xs text-gray-400 mt-1 truncate italic">"${e.preview.substring(0,60)}..."</div>
        <div class="text-xs text-gray-300 mt-1">Toro soạn lúc ${e.time} · Qwen-2.5</div>
      </div>`;
    });
  }
  if (approvedEmails.length > 0) {
    html += `<div class="px-4 py-2 bg-gray-50 text-xs font-semibold text-gray-400 uppercase tracking-wide">Đã duyệt (${approvedEmails.length})</div>`;
    approvedEmails.forEach(e => {
      html += `<div class="border-b border-gray-100 p-4 opacity-60">
        <div class="flex items-start justify-between mb-1">
          <span class="text-xs font-semibold text-gray-800 pr-2">${e.label}</span>
          <span class="text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded font-medium">✓ Đã gửi</span>
        </div>
        <div class="text-xs text-gray-500">${e.count > 1 ? e.count+' học viên' : '1 email'}</div>
      </div>`;
    });
  }
  panel.innerHTML = html;

  // Update approve all button
  document.getElementById('btn-approve-all').disabled = pending.length === 0;
  if (pending.length === 0) document.getElementById('btn-approve-all').className = 'bg-gray-200 text-gray-400 text-sm px-4 py-2 rounded-lg font-medium cursor-not-allowed flex items-center gap-2';
}

function selectEmail(id) {
  currentEmailId = id;
  const email = MOCK.emails.find(e => e.id === id);
  const isAppr = isApproved(id);
  renderEmailList(currentFilter);

  const preview = document.getElementById('email-preview-panel');

  const typeColors = { invite: 'orange', setup: 'blue', remind: 'purple' };
  const typeLabels = { invite: 'Email mời tham dự', setup: 'Setup phòng AF/IT', remind: 'Email remind' };

  const emailBodyContent = getEmailBody(email);

  preview.innerHTML = `
    <div class="bg-white rounded-xl border border-gray-100 px-5 py-4 flex items-center justify-between shadow-sm">
      <div class="space-y-1">
        <div class="flex items-center gap-4 text-xs text-gray-500">
          <span><strong class="text-gray-700">Từ:</strong> Toro &lt;zalopaycare@vng.com.vn&gt;</span>
          ${email.session ? `<span><strong class="text-gray-700">Session:</strong> ${email.session} · ${email.date}</span>` : `<span><strong class="text-gray-700">Ngày:</strong> ${email.date}</span>`}
        </div>
        <div class="flex items-center gap-4 text-xs text-gray-500">
          <span><strong class="text-gray-700">Đến:</strong> ${email.count > 1 ? email.count+' học viên (BCC per person)' : 'AF & IT team'}</span>
          <span class="flex items-center gap-1"><svg class="w-3 h-3 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"/></svg> AI · Qwen-2.5</span>
        </div>
      </div>
    </div>

    ${!isAppr ? `<div class="bg-blue-50 border border-blue-200 rounded-xl px-4 py-3">
      <div class="text-xs font-semibold text-blue-800 mb-1">💡 Toro AI đã personalise các trường sau cho từng học viên:</div>
      <div class="flex flex-wrap gap-2 text-xs text-blue-700">
        <span class="bg-blue-100 px-2 py-0.5 rounded">Tên học viên</span>
        <span class="bg-blue-100 px-2 py-0.5 rounded">Session số</span>
        <span class="bg-blue-100 px-2 py-0.5 rounded">Ngày giờ</span>
        <span class="bg-blue-100 px-2 py-0.5 rounded">Phòng họp</span>
        ${email.type==='remind' ? '<span class="bg-blue-100 px-2 py-0.5 rounded">Sáng/chiều</span>' : ''}
      </div>
    </div>` : ''}

    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
      <div class="bg-gray-50 border-b border-gray-100 px-5 py-3 flex items-center justify-between">
        <span class="text-xs font-semibold text-gray-700">Preview email${email.count>1?' (mẫu · Nguyễn Văn Minh)':''}</span>
        ${!isAppr ? '<button class="text-xs border border-gray-200 px-2.5 py-1 rounded-lg text-gray-600 hover:bg-white">Chỉnh sửa</button>' : ''}
      </div>
      <div class="p-5">${emailBodyContent}</div>
    </div>

    ${!isAppr ? `
    <div class="flex gap-3 pb-4">
      <button onclick="approveSingle('${id}')" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition flex items-center justify-center gap-2 text-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        Duyệt & Gửi${email.count>1?' cho '+email.count+' học viên':''}
      </button>
      <button class="px-5 py-3 border border-gray-200 text-gray-600 rounded-xl font-medium hover:bg-gray-50 text-sm">Chỉnh sửa</button>
      <button class="px-5 py-3 border border-red-200 text-red-500 rounded-xl font-medium hover:bg-red-50 text-sm">Từ chối</button>
    </div>` : `<div class="bg-green-50 border border-green-200 rounded-xl px-4 py-3 text-sm text-green-700 font-medium text-center">✓ Email đã được duyệt và gửi thành công</div>`}
  `;
}

function getEmailBody(email) {
  if (email.type === 'invite') {
    return `<div class="border border-gray-200 rounded-xl overflow-hidden text-sm">
      <div class="bg-green-700 px-5 py-3 text-white">
        <div class="font-bold text-sm">STRENGTHS-BASED DEVELOPMENT WORKSHOP</div>
        <div class="text-xs opacity-75">Zalopay Learning & Development</div>
      </div>
      <div class="px-5 py-4 space-y-3 text-gray-700 text-xs leading-relaxed">
        <p><strong>Starter</strong> thân mến,</p>
        <p>Sau khi tham gia Strengths Assessment vào tháng 12/2025, bạn đã sẵn trên tay Strengths Report chi tiết.</p>
        <p>Toro trân trọng mời <strong class="text-green-700">Nguyễn Văn Minh</strong> đến tham gia <strong>Strengths-based Development Workshop</strong>:</p>
        <div class="bg-green-50 border border-green-200 rounded-lg px-3 py-2.5 space-y-1">
          <div class="flex gap-2"><span class="text-gray-400 w-20">Thời gian:</span><strong>9:30 – 12:00, ngày ${email.date}</strong></div>
          <div class="flex gap-2"><span class="text-gray-400 w-20">Địa điểm:</span><strong>Đà Nẵng – Hà Nội Room, VNG Campus</strong></div>
          <div class="flex gap-2"><span class="text-gray-400 w-20">Session:</span><strong>Session ${email.session} / 4</strong></div>
        </div>
        <p class="text-gray-400 italic">Starter vui lòng phản hồi calendar này 2 ngày trước ngày Workshop nhé!</p>
        <p>Trân trọng,<br/><strong>Toro</strong> · Brand Ambassador, Zalopay</p>
      </div>
    </div>`;
  } else if (email.type === 'setup') {
    return `<div class="border border-gray-200 rounded-xl overflow-hidden text-xs">
      <div class="bg-blue-700 px-5 py-3 text-white font-bold">SETUP PHÒNG — AF & IT REQUEST</div>
      <div class="px-5 py-4 space-y-3 text-gray-700 leading-relaxed">
        <p>Dear AF và IT team,</p>
        <p>Team Zalopay có tổ chức workshop theo lịch dưới đây, nhờ AF & IT team hỗ trợ set up phòng:</p>
        <table class="w-full border-collapse border border-gray-200 text-xs mt-2">
          <thead><tr class="bg-gray-50"><th class="border border-gray-200 px-2 py-1.5 text-left">Ngày</th><th class="border border-gray-200 px-2 py-1.5 text-left">Giờ</th><th class="border border-gray-200 px-2 py-1.5 text-left">Phòng</th><th class="border border-gray-200 px-2 py-1.5 text-left">Số lượng</th></tr></thead>
          <tbody>
            <tr><td class="border border-gray-200 px-2 py-1">25/3/2026</td><td class="border border-gray-200 px-2 py-1">9:30–12:00</td><td class="border border-gray-200 px-2 py-1">Đà Nẵng – Hà Nội</td><td class="border border-gray-200 px-2 py-1">29+3</td></tr>
            <tr><td class="border border-gray-200 px-2 py-1">26/3/2026</td><td class="border border-gray-200 px-2 py-1">9:30–12:00</td><td class="border border-gray-200 px-2 py-1">Đà Nẵng – Hà Nội</td><td class="border border-gray-200 px-2 py-1">27+3</td></tr>
            <tr><td class="border border-gray-200 px-2 py-1">27/3/2026</td><td class="border border-gray-200 px-2 py-1">14:30–17:00</td><td class="border border-gray-200 px-2 py-1">Đà Nẵng – Hà Nội</td><td class="border border-gray-200 px-2 py-1">22+3</td></tr>
            <tr><td class="border border-gray-200 px-2 py-1">31/3/2026</td><td class="border border-gray-200 px-2 py-1">14:30–17:00</td><td class="border border-gray-200 px-2 py-1">Sài Gòn – Đà Nẵng</td><td class="border border-gray-200 px-2 py-1">26+3</td></tr>
          </tbody>
        </table>
        <div class="mt-2 space-y-1">
          <p><strong>Nhờ AF:</strong> Xếp 5 bàn (4 nhóm + 1 bàn kỹ thuật), 4 Flipchart, ghế theo số lượng</p>
          <p><strong>Nhờ IT:</strong> Dây nối monitor, micro, pointer. Book 2 phòng → nối monitor</p>
        </div>
      </div>
    </div>`;
  } else {
    return `<div class="border border-gray-200 rounded-xl overflow-hidden text-xs">
      <div class="bg-purple-700 px-5 py-3 text-white font-bold">EMAIL NHẮC NHỞ THAM DỰ · 12 TIẾNG TRƯỚC</div>
      <div class="px-5 py-4 space-y-3 text-gray-700 leading-relaxed">
        <p><strong>Starter</strong> ơi,</p>
        <p>Buổi sáng ngày mai <strong>(${email.date.replace('Gửi ','')})</strong> lúc <strong>9h30–12h</strong> chúng ta có hẹn tại Strengths Workshop!</p>
        <div class="space-y-1 bg-purple-50 border border-purple-100 rounded-lg p-3">
          <p>❌ Không cần mang theo Laptop</p>
          <p>✅ Có mặt đúng giờ: <strong>9h30</strong> tại Đà Nẵng – Hà Nội Room</p>
          <p>✅ Đọc trước Strengths Report, ghi chú thắc mắc</p>
          <p>✅ Giữ tâm thế cởi mở, sẵn sàng học hỏi</p>
          <p>✅ Đem theo điện thoại và bình nước cá nhân</p>
        </div>
        <p>Hẹn gặp Starter tại Workshop ngày mai nhé!<br/><strong>Toro</strong></p>
      </div>
    </div>`;
  }
}

function approveSingle(id) {
  approveEmail(id);
  showToast('✓ Email đã được gửi thành công qua Outlook!', 'success');
  setTimeout(() => showZaloNotif('Email "' + MOCK.emails.find(e=>e.id===id).label + '" đã gửi thành công!'), 1000);
  currentEmailId = null;
  renderEmailList(currentFilter);
  document.getElementById('email-preview-panel').innerHTML = `<div class="flex items-center justify-center h-full text-gray-400 text-sm">← Chọn một email để xem preview</div>`;

  // Auto-select next
  const remaining = getPendingEmails();
  if (remaining.length > 0) setTimeout(() => selectEmail(remaining[0].id), 300);
}

function approveAll() {
  const pending = getPendingEmails();
  if (pending.length === 0) return;

  let i = 0;
  const btn = document.getElementById('btn-approve-all');
  btn.textContent = 'Đang gửi...';
  btn.disabled = true;

  const iv = setInterval(() => {
    if (i < pending.length) {
      approveEmail(pending[i].id);
      i++;
      renderEmailList(currentFilter);
    } else {
      clearInterval(iv);
      const total = pending.reduce((s,e) => s + e.count, 0);
      showToast(`✓ Đã gửi tất cả email cho ${total} học viên!`, 'success');
      setTimeout(() => showZaloNotif(`Tất cả ${pending.length} email đã gửi thành công qua Outlook! Tổng ${total} học viên nhận được.`), 800);
      document.getElementById('email-preview-panel').innerHTML = `<div class="flex flex-col items-center justify-center h-full gap-4"><div class="text-4xl">✅</div><div class="text-gray-600 font-semibold">Tất cả email đã được gửi!</div><a href="rsvp.html" class="bg-green-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-green-700">Theo dõi RSVP →</a></div>`;
    }
  }, 400);
}

function filterEmails(type) {
  currentFilter = type;
  renderEmailList(type);
}

// Init
renderEmailList('all');
if (getPendingEmails().length > 0) setTimeout(() => selectEmail(getPendingEmails()[0].id), 100);
</script>
</body>
</html>
